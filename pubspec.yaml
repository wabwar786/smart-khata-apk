name: smart_khata_app
description: Smart Khata Android app for small business accounting, customers, products, invoices, payments and ledger.
publish_to: 'none'
version: 2.1.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  flutter_contacts: ^1.1.9+2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/smart_khata_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/smart_khata_icon.png"
  adaptive_icon_background: "#5A004D"
  adaptive_icon_foreground: "assets/icon/smart_khata_icon.png"

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
