name: Build Smart Khata APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.32.0'

      - name: Create Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --project-name smart_khata_app
          fi
          rm -rf test

      - name: Ensure Android internet permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/src/main/AndroidManifest.xml')
          s = p.read_text()
          old = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          new = old + '\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_CONTACTS" />'
          s = s.replace(old, new, 1)
          p.write_text(s)
          PY
          fi

      - name: Ensure Android contacts permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.READ_CONTACTS" "$MANIFEST"; then
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/src/main/AndroidManifest.xml')
          s = p.read_text()
          old = '<uses-permission android:name="android.permission.INTERNET" />'
          s = s.replace(old, old + '\n    <uses-permission android:name="android.permission.READ_CONTACTS" />', 1)
          p.write_text(s)
          PY
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-khata-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
